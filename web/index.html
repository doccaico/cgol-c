<!doctype html>
<html lang="EN-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>Simple CGOL</title>

    <meta name="title" content="Simple CGOL">
    <meta name="description" content="A single player game invented in 1970 by Cambridge mathematician John Conway">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
   html, body {
          margin: 0 !important;
          padding: 0 !important;
          width: 100vw !important;
          
          /* アドレスバーの有無に合わせてリアルタイムに高さが100%に調整 */
          height: 100dvh !important; 
          
          background-color: #1a1a24; /* 背景をゲームと同じ暗い色に */
          overflow: hidden !important;

          /* 上下左右の完全に真ん中に要素を集める設定 */
          display: flex !important;
          justify-content: center !important;
          align-items: center !important;
        }

        /* 2. Canvas自体を画面の中央に固定する設定 */
        canvas.emscripten {
          border: 0px none;
          background-color: black;

          /* 他のCSSに邪魔されないよう最優先で真ん中に寄せる */
          display: block !important;
          margin: auto !important; 

          /* 縦横比（2/3）を保ったまま、画面の「縦」か「横」の狭い方に100%合わせる */
          width: auto !important;
          height: auto !important;
          max-width: 100vw !important;
          
          max-height: 100dvh !important; 
          
          aspect-ratio: 2 / 3 !important;

          image-rendering: pixelated; 
        }
    </style>
    <script type='text/javascript' src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"> </script>
    <script type='text/javascript'>
        function saveFileFromMEMFSToDisk(memoryFSname, localFSname)     // This can be called by C/C++ code
        {
            var isSafari = false; // Not supported, navigator.userAgent access is being restricted
            //var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            var data = FS.readFile(memoryFSname);
            var blob;

            if (isSafari) blob = new Blob([data.buffer], { type: "application/octet-stream" });
            else blob = new Blob([data.buffer], { type: "application/octet-binary" });

            // NOTE: SaveAsDialog is a browser setting. For example, in Google Chrome,
            // in Settings/Advanced/Downloads section you have a setting:
            // 'Ask where to save each file before downloading' - which you can set true/false.
            // If you enable this setting it would always ask you and bring the SaveAsDialog
            saveAs(blob, localFSname);
          
            // Alternative implementation to avoid FileSaver.js
            //const link = document.createElement("a");
            //link.href = URL.createObjectURL(blob);
            //link.download = localFSname;
            //link.click();
        }
    </script>
    </head>
    <body>
        <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
        <p id="output" />
        <script>
            var Module = {
                print: (function() {
                    var element = document.getElementById('output');
                    if (element) element.value = ''; // clear browser cache
                    return function(text) {
                        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                        console.log(text);
                        if (element) {
                          element.value += text + "\n";
                          element.scrollTop = element.scrollHeight; // focus on bottom
                        }
                    };
                })(),
                canvas: (function() {
                    var canvas = document.getElementById('canvas');
                    return canvas;
                })()
            };
        </script>
        <script async type="text/javascript" src="index.js"></script>
    </body>
</html>
